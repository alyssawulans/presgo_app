name: presgo_app
description: "A standalone PresGo Absensi application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.8
  curved_navigation_bar: ^1.0.6
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  geocoding: ^4.0.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.17.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.12.0
  lottie: ^3.3.3
  path: ^1.9.1
  retrofit: ^4.9.2
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.15.0
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/playstore.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
